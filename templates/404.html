<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Nicht gefunden | HELA</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        :root {
            --bg: #F6F2FA;
            --text: #1A1B1F;
            --surface: #FFFFFF;
            --container: #F2EDF7;
            --primary: #6750A4;
            --on-primary: #FFFFFF;
            --primary-container: #EADDFF;
            --outline: #79747E;
            --outline-light: #C4C0C9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
        }

        .error-box {
            max-width: 440px;
        }

        .error-icon {
            width: 80px;
            height: 80px;
            background: var(--primary-container);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .error-icon .material-symbols-outlined {
            font-size: 40px;
            color: var(--primary);
        }

        .error-code {
            font-size: 72px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 8px;
        }

        .error-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .error-message {
            font-size: 15px;
            color: var(--outline);
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .error-path {
            display: inline-block;
            background: var(--surface);
            border: 1px solid var(--outline-light);
            padding: 8px 16px;
            border-radius: 12px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            color: var(--text);
            margin-bottom: 32px;
            word-break: break-all;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--primary);
            color: var(--on-primary);
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 500;
            transition: opacity .15s;
        }
        .back-btn:hover { opacity: 0.85; }

        .branding {
            margin-top: 48px;
            font-size: 12px;
            color: var(--outline-light);
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>
    <div class="error-box">
        <div class="error-icon">
            <span class="material-symbols-outlined">explore_off</span>
        </div>
        <div class="error-code">404</div>
        <h1 class="error-title">Seite nicht gefunden</h1>
        <p class="error-message">Die angeforderte Seite existiert nicht oder wurde entfernt.</p>
        <div class="error-path">{{ path }}</div>
        <br>
        <a href="/" class="back-btn">
            <span class="material-symbols-outlined" style="font-size:18px">arrow_back</span>
            Zur Startseite
        </a>
        <div class="branding">HELA — Hypertext Efficient Launching Architecture</div>
    </div>
</body>

</html>
